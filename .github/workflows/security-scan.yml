name: Security Scan

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix web
      - name: Go vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Frontend production dependency audit
        run: npm --prefix web audit --omit=dev --audit-level=high
      - name: Code reality and secret scan
        run: python3 scripts/p93_code_reality_audit.py --check
