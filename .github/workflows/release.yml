name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_label:
        description: "Release label"
        required: false
        default: "github-release"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec@latest
      - name: Install frontend dependencies
        run: npm ci --prefix web
      - name: Validate before packaging
        run: |
          openspec validate --all --strict
          go vet ./...
          go test ./...
          npm --prefix web run lint
          npm --prefix web test
          npm --prefix web run build
          python3 scripts/p91_deployment_check.py
          python3 scripts/p92_final_requirement_audit.py --check
          python3 scripts/p93_code_reality_audit.py --check
          git diff --check
      - name: Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --timeout=5m --enable-only=govet,ineffassign,staticcheck,unused ./...
      - name: Build release package
        id: package
        run: |
          LABEL="${{ inputs.release_label }}"
          if [ -z "$LABEL" ]; then LABEL="${GITHUB_REF_NAME}"; fi
          bash scripts/local-release-package.sh --release-label "$LABEL" --output-dir tmp/github-release
          ARCHIVE="$(find tmp/github-release -name "investment-agent-*.tar.gz" -print | head -n 1)"
          MANIFEST="$(find tmp/github-release -name "release-manifest.json" -print | head -n 1)"
          test -n "$ARCHIVE"
          test -n "$MANIFEST"
          bash scripts/local-release-package.sh --verify "$ARCHIVE" --output-dir tmp/github-release
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: investment-agent-release-package
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.manifest }}
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.manifest }}
          body: |
            Investment Agent local deployment package.

            Runtime LLM secrets are not included. Copy .env.example to .env on the target machine before running scripts/install.sh.
