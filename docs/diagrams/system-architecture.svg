<rect width="1800" height="1320" fill="#f6f7f8"/>
<text x="60" y="72" class="title" >Investment Agent 总体架构图</text><text x="60" y="108" class="subtitle" >五层工程架构；前端只经 HTTP API 使用 DTO；SQLite 是事实基准，VecLite 是可重建索引。</text><rect x="60" y="140" width="1360" height="78" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="92" y="188" class="box-title" >1 用户请求 → 2 HTTP API → 3 WorkflowContext → 4 Eino Graph → 5 规则裁决 → 6 保存后展示 → 7 用户记录</text><rect x="60" y="250" width="1360" height="150" rx="12" fill="#ffffff" stroke="#d6d9dd" /><rect x="60" y="250" width="210" height="150" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="86" y="305" class="section" >产品界面层</text><text x="86" y="335" class="small" >用户入口与页面组织</text><rect x="300.0" y="284" width="349.3333333333333" height="82" rx="12" class="node" /><text x="318.0" y="314" class="box-title" >今日纪律</text><text x="318.0" y="340" class="small" >dashboard_state / 禁止事项 / 证据摘要</text><rect x="665.3333333333333" y="284" width="349.3333333333333" height="82" rx="12" class="node" /><text x="683.3333333333333" y="314" class="box-title" >决策咨询</text><text x="683.3333333333333" y="340" class="small" >能力圈检查与证据核验</text><rect x="1030.6666666666665" y="284" width="349.3333333333333" height="82" rx="12" class="node" /><text x="1048.6666666666665" y="314" class="box-title" >支撑页面</text><text x="1048.6666666666665" y="340" class="small" >持仓、证据、规则、审计、设置</text><rect x="60" y="430" width="1360" height="150" rx="12" fill="#ffffff" stroke="#d6d9dd" /><rect x="60" y="430" width="210" height="150" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="86" y="485" class="section" >应用接口层</text><text x="86" y="515" class="small" >请求接入与 DTO 返回</text><rect x="300.0" y="464" width="349.3333333333333" height="82" rx="12" class="blue" /><text x="318.0" y="494" class="box-title" >HTTP API</text><text x="318.0" y="520" class="small" >本地 JSON；不暴露公网</text><rect x="665.3333333333333" y="464" width="349.3333333333333" height="82" rx="12" class="blue" /><text x="683.3333333333333" y="494" class="box-title" >Handler / UseCase</text><text x="683.3333333333333" y="520" class="small" >校验、组装上下文、触发 Graph</text><rect x="1030.6666666666665" y="464" width="349.3333333333333" height="82" rx="12" class="blue" /><text x="1048.6666666666665" y="494" class="box-title" >Frontend DTO</text><text x="1048.6666666666665" y="520" class="small" >前端不访问 SQLite / VecLite</text><rect x="60" y="610" width="1360" height="240" rx="12" fill="#ffffff" stroke="#d6d9dd" /><rect x="60" y="610" width="210" height="240" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="86" y="665" class="section" >工作流编排层</text><text x="86" y="695" class="small" >Eino Graph 固定流程</text><rect x="300.0" y="644" width="203.2" height="82" rx="12" class="blue" /><text x="318.0" y="674" class="box-title" >DailyDisciplineGraph</text><text x="318.0" y="700" class="small" >每日纪律巡检</text><rect x="519.2" y="644" width="203.2" height="82" rx="12" class="blue" /><text x="537.2" y="674" class="box-title" >ConsultationGraph</text><text x="537.2" y="700" class="small" >主动咨询链路</text><rect x="738.4" y="644" width="203.2" height="82" rx="12" class="blue" /><text x="756.4" y="674" class="box-title" >EvidenceVerificationGraph</text><text x="756.4" y="700" class="small" >证据核验</text><rect x="957.5999999999999" y="644" width="203.2" height="82" rx="12" class="blue" /><text x="975.5999999999999" y="674" class="box-title" >EvolutionProposalGraph</text><text x="975.5999999999999" y="700" class="small" >生成 rule_proposals</text><rect x="1176.8" y="644" width="203.2" height="82" rx="12" class="blue" /><text x="1194.8" y="674" class="box-title" >GatekeeperAuditGraph</text><text x="1194.8" y="700" class="small" >approved 后 pending_final_confirm</text><rect x="60" y="880" width="1360" height="150" rx="12" fill="#ffffff" stroke="#d6d9dd" /><rect x="60" y="880" width="210" height="150" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="86" y="935" class="section" >领域决策层</text><text x="86" y="965" class="small" >纪律规则与受控进化</text><rect x="300.0" y="914" width="349.3333333333333" height="82" rx="12" class="warn" /><text x="318.0" y="944" class="box-title" >根本规则</text><text x="318.0" y="970" class="small" >不预测、证据优先、单信源限制</text><rect x="665.3333333333333" y="914" width="349.3333333333333" height="82" rx="12" class="warn" /><text x="683.3333333333333" y="944" class="box-title" >SOP 与阈值</text><text x="683.3333333333333" y="970" class="small" >现金底线、仓位上限、冻结观察</text><rect x="1030.6666666666665" y="914" width="349.3333333333333" height="82" rx="12" class="warn" /><text x="1048.6666666666665" y="944" class="box-title" >提案安全门</text><text x="1048.6666666666665" y="970" class="small" >pending_user_confirm → audit → pending_final_confirm → applied</text><rect x="60" y="1060" width="1360" height="150" rx="12" fill="#ffffff" stroke="#d6d9dd" /><rect x="60" y="1060" width="210" height="150" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="86" y="1115" class="section" >基础设施层</text><text x="86" y="1145" class="small" >模型、存储与外部数据</text><rect x="300.0" y="1094" width="258.0" height="82" rx="12" class="blue" /><text x="318.0" y="1124" class="box-title" >DeepSeek</text><text x="318.0" y="1150" class="small" >只产出 analyst_reports</text><rect x="574.0" y="1094" width="258.0" height="82" rx="12" class="blue" /><text x="592.0" y="1124" class="box-title" >SQLite</text><text x="592.0" y="1150" class="small" >本地事实基准</text><rect x="848.0" y="1094" width="258.0" height="82" rx="12" class="blue" /><text x="866.0" y="1124" class="box-title" >VecLite</text><text x="866.0" y="1150" class="small" >rag_chunks 可重建索引</text><rect x="1122.0" y="1094" width="258.0" height="82" rx="12" class="blue" /><text x="1140.0" y="1124" class="box-title" >行情/情报源</text><text x="1140.0" y="1150" class="small" >市场数据、公告、新闻、研报</text><rect x="1450" y="250" width="300" height="760" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="1474" y="292" class="section" >安全与审计边界</text><rect x="1474" y="326" width="252" height="86" rx="12" class="warn" /><text x="1492" y="356" class="box-title" >无自动交易</text><text x="1492" y="382" class="small" >不接入券商交易 API；确认只记录线下动作</text><rect x="1474" y="431" width="252" height="86" rx="12" class="warn" /><text x="1492" y="461" class="box-title" >规则优先</text><text x="1492" y="487" class="small" >DeepSeek 观点不能绕过规则裁决</text><rect x="1474" y="536" width="252" height="86" rx="12" class="warn" /><text x="1492" y="566" class="box-title" >多源验证</text><text x="1492" y="592" class="small" >C 级只能 background；失败进入冻结观察</text><rect x="1474" y="641" width="252" height="86" rx="12" class="warn" /><text x="1492" y="671" class="box-title" >规则最终确认</text><text x="1492" y="697" class="small" >Gatekeeper approved → pending_final_confirm → final-confirm → rule_versions</text><rect x="1474" y="746" width="252" height="86" rx="12" class="ok" /><text x="1492" y="776" class="box-title" >正式建议门槛</text><text x="1492" y="802" class="small" >DecisionRecordNode 写入成功后才展示</text><rect x="1474" y="851" width="252" height="86" rx="12" class="ok" /><text x="1492" y="881" class="box-title" >节点级审计</text><text x="1492" y="907" class="small" >audit_events.action / node_action 分别记录</text><text x="60" y="1275" class="small" >阅读方式：从上到下看工程分层；右侧边界适用于所有层。</text>
</svg>
