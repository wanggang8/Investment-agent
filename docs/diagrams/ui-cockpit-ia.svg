<?xml version="1.0" encoding="UTF-8"?>
<svg width="1800" height="980" viewBox="0 0 1800 980" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#667085"/></marker><style>
text{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}
.title{font-size:34px;font-weight:700;fill:#1f2328}.subtitle{font-size:18px;fill:#667085}
.section{font-size:18px;font-weight:700;fill:#1f2328}.lane-title{font-size:16px;font-weight:700;fill:#1f2328}
.box-title{font-size:15px;font-weight:700;fill:#1f2328}.body{font-size:14px;fill:#344054}.small{font-size:12px;fill:#667085}.label{font-size:11px;fill:#667085}
.node{fill:#ffffff;stroke:#d6d9dd;stroke-width:2}.soft{fill:#eef1f4;stroke:#d6d9dd;stroke-width:2}.store{fill:#eef1f4;stroke:#d6d9dd;stroke-width:2}.warn{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.ok{fill:#f0fdf4;stroke:#bbf7d0;stroke-width:2}.blue{fill:#f8fbff;stroke:#bfdbfe;stroke-width:2}.term{fill:#ffffff;stroke:#d6d9dd;stroke-width:2;stroke-dasharray:6 4}.arrow{fill:none;stroke:#667085;stroke-width:2;marker-end:url(#arrow)}

</style></defs>
<rect width="1800" height="980" fill="#f6f7f8"/>
<text x="60" y="72" class="title" >主驾驶舱信息架构图</text><text x="60" y="108" class="subtitle" >首页必须先展示纪律状态、风险边界、证据与确认入口，而不是行情榜或聊天框。</text><rect x="40" y="150" width="1720" height="120" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="70" y="194" class="section" >首页定位</text><text x="70" y="224" class="small" >默认入口是纪律驾驶舱：回答今天能否行动、是否触发红线、依据是什么、用户能记录哪些动作。</text><rect x="40" y="310" width="360" height="500" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="64" y="350" class="section" >左侧导航与状态</text><text x="64" y="376" class="small" >数据有效性</text><rect x="460" y="310" width="820" height="500" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="484" y="350" class="section" >中间裁决工作区</text><text x="484" y="376" class="small" >风险与裁决优先</text><rect x="1340" y="310" width="420" height="500" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="1364" y="350" class="section" >右侧证据与规则面板</text><text x="1364" y="376" class="small" >裁决可追踪</text><rect x="80" y="420" width="280" height="105" rx="12" class="node" /><text x="98" y="450" class="box-title" >导航</text><text x="98" y="476" class="small" >今日纪律 / 持仓</text><text x="98" y="496" class="small" >决策咨询 / 情报证据</text><text x="98" y="516" class="small" >规则纪律 / 复盘审计 / 设置</text><rect x="80" y="555" width="280" height="110" rx="12" class="node" /><text x="98" y="585" class="box-title" >系统状态</text><text x="98" y="611" class="small" >页面状态：normal / 信息不足</text><text x="98" y="631" class="small" >数据更新时间：09:30</text><text x="98" y="651" class="small" >规则版本：v3.0</text><rect x="80" y="695" width="280" height="105" rx="12" class="node" /><text x="98" y="725" class="box-title" >账户摘要</text><text x="98" y="751" class="small" >总资产、现金比例</text><text x="98" y="771" class="small" >高风险仓位、持仓数量</text><text x="98" y="791" class="small" >仅 executed_manually 更新账户</text><rect x="500" y="400" width="340" height="120" rx="12" class="node" /><text x="518" y="430" class="box-title" >纪律状态</text><text x="518" y="456" class="small" >观察 / 高危 / 信息不足 / 冻结观察</text><text x="518" y="476" class="small" >主文案：暂停新增买入</text><text x="518" y="496" class="small" >风险级别必须有文字说明</text><rect x="900" y="400" width="340" height="120" rx="12" class="node" /><text x="918" y="430" class="box-title" >触发规则与禁止事项</text><text x="918" y="456" class="small" >R-3 仓位上限</text><text x="918" y="476" class="small" >SOURCE_VERIFICATION 多源验证</text><text x="918" y="496" class="small" >禁止项先于收益信息展示</text><rect x="500" y="560" width="340" height="120" rx="12" class="node" /><text x="518" y="590" class="box-title" >最终裁决</text><text x="518" y="616" class="small" >继续持有 / 暂停新增买入</text><text x="518" y="636" class="small" >不预测短期涨跌</text><text x="518" y="656" class="small" >规则裁决高于 Agent 观点</text><rect x="900" y="560" width="340" height="120" rx="12" class="node" /><text x="918" y="590" class="box-title" >Agent 观点摘要</text><text x="918" y="616" class="small" >价值分析师：估值与安全边际</text><text x="918" y="636" class="small" >趋势风控官：仓位与流动性</text><text x="918" y="656" class="small" >只作为分析材料</text><rect x="500" y="710" width="740" height="80" rx="12" class="node" /><text x="518" y="740" class="box-title" >用户确认入口</text><text x="518" y="766" class="small" >记录计划 / 已手动执行 / 标记待观察 / 标记错误</text><text x="518" y="786" class="small" >不出现自动买入、一键卖出、代为执行</text><rect x="1380" y="405" width="330" height="115" rx="12" class="node" /><text x="1398" y="435" class="box-title" >证据摘要</text><text x="1398" y="461" class="small" >3 个正式信源 + 1 个背景材料</text><text x="1398" y="481" class="small" >A/B/C 与 formal/background</text><text x="1398" y="501" class="small" >C 级仅作背景材料</text><rect x="1380" y="555" width="330" height="115" rx="12" class="node" /><text x="1398" y="585" class="box-title" >规则命中</text><text x="1398" y="611" class="small" >根本规则、SOP、阈值</text><text x="1398" y="631" class="small" >裁决优先级可查看</text><text x="1398" y="651" class="small" >多源验证不伪装成根本规则</text><rect x="1380" y="700" width="330" height="105" rx="12" class="node" /><text x="1398" y="730" class="box-title" >审计状态</text><text x="1398" y="756" class="small" >audit_events.action：用户/API动作</text><text x="1398" y="776" class="small" >audit_events.node_action：节点动作</text><text x="1398" y="796" class="small" >保存 request_id 与状态流转</text><path d="M 360 600 L 500 460" class="arrow"/><rect x="366.0" y="505.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="430.0" y="522.0" class="label" text-anchor="middle" >状态进入裁决</text><path d="M 1240 620 L 1380 462" class="arrow" stroke-dasharray="6 5"/><rect x="1246.0" y="516.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1310.0" y="533.0" class="label" text-anchor="middle" >引用依据</text><path d="M 900 750 L 360 740" class="arrow" stroke-dasharray="6 5"/><rect x="566.0" y="720.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="630.0" y="737.0" class="label" text-anchor="middle" >记录动作</text><rect x="40" y="870" width="1720" height="62" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="70" y="905" class="box-title" >阅读重点</text><text x="180" y="905" class="small" >信息层级：纪律状态 → 风险与禁止项 → 证据与规则 → 确认记录。</text>
</svg>
