<text x="60" y="72" class="title" >页面流转审计图</text><text x="60" y="108" class="subtitle" >页面之间支撑查看、确认、证据追踪、复盘审计和规则提案，不引导自动交易。</text><rect x="40" y="150" width="2020" height="180" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="64" y="188" class="section" >一、每日查看主路径</text><text x="64" y="214" class="small" >先看纪律状态，再查看详情和证据；若涉及动作，只记录计划或线下执行结果。</text><rect x="40" y="370" width="2020" height="180" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="64" y="408" class="section" >二、主动咨询路径</text><text x="64" y="434" class="small" >核验完成前不展示正式建议，保存成功后展示报告。</text><rect x="40" y="590" width="2020" height="230" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="64" y="628" class="section" >三、错误标注与规则进化路径</text><text x="64" y="654" class="small" >规则提案必须经过用户确认、守门人审计和最终确认后才生效。</text><rect x="40" y="870" width="2020" height="180" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="64" y="908" class="section" >四、配置与边界</text><text x="64" y="934" class="small" >页面不得绕过 API 访问 SQLite 或 VecLite。</text><rect x="100" y="230" width="230" height="82" rx="12" class="node" /><text x="118" y="260" class="box-title" >今日纪律页</text><text x="118" y="286" class="small" >默认首页 / 风险优先</text><rect x="450" y="230" width="230" height="82" rx="12" class="node" /><text x="468" y="260" class="box-title" >决策详情页</text><text x="468" y="286" class="small" >完整裁决链路</text><rect x="800" y="230" width="230" height="82" rx="12" class="node" /><text x="818" y="260" class="box-title" >情报与证据页</text><text x="818" y="286" class="small" >formal / background</text><rect x="1150" y="230" width="250" height="82" rx="12" class="node" /><text x="1168" y="260" class="box-title" >用户确认区</text><text x="1168" y="286" class="small" >计划 / 手动执行 / 观察 / 错误</text><rect x="1520" y="230" width="230" height="82" rx="12" class="soft" /><text x="1538" y="260" class="box-title" >复盘与审计页</text><text x="1538" y="286" class="small" >确认记录与审计日志</text><path d="M 330 271 L 450 271" class="arrow"/><rect x="326.0" y="246.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="390.0" y="263.0" class="label" text-anchor="middle" >查看详情</text><path d="M 680 271 L 800 271" class="arrow"/><rect x="676.0" y="246.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="740.0" y="263.0" class="label" text-anchor="middle" >查看证据</text><path d="M 1030 271 L 1150 271" class="arrow" stroke-dasharray="6 5"/><rect x="1026.0" y="246.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1090.0" y="263.0" class="label" text-anchor="middle" >返回确认</text><path d="M 1400 271 L 1520 271" class="arrow"/><rect x="1396.0" y="246.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1460.0" y="263.0" class="label" text-anchor="middle" >写审计</text><rect x="100" y="450" width="230" height="82" rx="12" class="node" /><text x="118" y="480" class="box-title" >决策咨询页</text><text x="118" y="506" class="small" >问题 / 标的 / 场景</text><rect x="450" y="450" width="230" height="82" rx="12" class="node" /><text x="468" y="480" class="box-title" >前置检查</text><text x="468" y="506" class="small" >能力圈 / 账户 / 证据</text><rect x="800" y="450" width="250" height="82" rx="12" class="node" /><text x="818" y="480" class="box-title" >Eino Workflow</text><text x="818" y="506" class="small" >状态、证据、Agent、规则</text><rect x="1180" y="450" width="230" height="82" rx="12" class="node" /><text x="1198" y="480" class="box-title" >决策详情页</text><text x="1198" y="506" class="small" >保存成功后展示</text><rect x="1520" y="450" width="230" height="82" rx="12" class="node" /><text x="1538" y="480" class="box-title" >情报与证据页</text><text x="1538" y="506" class="small" >证据链与信源</text><path d="M 330 491 L 450 491" class="arrow"/><rect x="326.0" y="466.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="390.0" y="483.0" class="label" text-anchor="middle" >提交问题</text><path d="M 680 491 L 800 491" class="arrow"/><rect x="676.0" y="466.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="740.0" y="483.0" class="label" text-anchor="middle" >开始核验</text><path d="M 1050 491 L 1180 491" class="arrow"/><rect x="1051.0" y="466.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1115.0" y="483.0" class="label" text-anchor="middle" >保存后展示</text><path d="M 1410 491 L 1520 491" class="arrow"/><rect x="1401.0" y="466.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1465.0" y="483.0" class="label" text-anchor="middle" >查看证据</text><rect x="100" y="695" width="210" height="82" rx="12" class="node" /><text x="118" y="725" class="box-title" >决策详情页</text><text x="118" y="751" class="small" >标记错误入口</text><rect x="410" y="695" width="210" height="82" rx="12" class="soft" /><text x="428" y="725" class="box-title" >复盘与审计页</text><text x="428" y="751" class="small" >历史建议 / 错误案例</text><rect x="720" y="695" width="210" height="82" rx="12" class="soft" /><text x="738" y="725" class="box-title" >错误案例库</text><text x="738" y="751" class="small" >actual_outcome / lesson</text><rect x="1030" y="695" width="210" height="82" rx="12" class="soft" /><text x="1048" y="725" class="box-title" >规则提案</text><text x="1048" y="751" class="small" >pending_user_confirm</text><rect x="1340" y="695" width="230" height="82" rx="12" class="soft" /><text x="1358" y="725" class="box-title" >守门人审计</text><text x="1358" y="751" class="small" >approved / rejected / needs_user_review</text><rect x="1660" y="695" width="220" height="82" rx="12" class="soft" /><text x="1678" y="725" class="box-title" >待最终确认</text><text x="1678" y="751" class="small" >pending_final_confirm</text><rect x="1960" y="695" width="90" height="82" rx="12" class="soft" /><text x="1978" y="725" class="box-title" >规则版本</text><text x="1978" y="751" class="small" >applied</text><path d="M 310 736 L 410 736" class="arrow"/><rect x="296.0" y="711.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="360.0" y="728.0" class="label" text-anchor="middle" >标记错误</text><path d="M 620 736 L 720 736" class="arrow"/><rect x="606.0" y="711.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="670.0" y="728.0" class="label" text-anchor="middle" >写入案例</text><path d="M 930 736 L 1030 736" class="arrow"/><rect x="916.0" y="711.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="980.0" y="728.0" class="label" text-anchor="middle" >生成提案</text><path d="M 1240 736 L 1340 736" class="arrow"/><rect x="1226.0" y="711.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1290.0" y="728.0" class="label" text-anchor="middle" >用户确认</text><path d="M 1570 736 L 1660 736" class="arrow"/><rect x="1551.0" y="711.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1615.0" y="728.0" class="label" text-anchor="middle" >审计通过</text><path d="M 1880 736 L 1960 736" class="arrow"/><rect x="1856.0" y="711.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1920.0" y="728.0" class="label" text-anchor="middle" >最终确认</text><rect x="100" y="955" width="230" height="82" rx="12" class="soft" /><text x="118" y="985" class="box-title" >持仓页</text><text x="118" y="1011" class="small" >账户、持仓、买入逻辑</text><rect x="450" y="955" width="230" height="82" rx="12" class="soft" /><text x="468" y="985" class="box-title" >设置页</text><text x="468" y="1011" class="small" >能力圈、仓位、现金阈值</text><rect x="800" y="955" width="230" height="82" rx="12" class="soft" /><text x="818" y="985" class="box-title" >规则与纪律页</text><text x="818" y="1011" class="small" >根本规则、SOP、提案</text><rect x="1180" y="955" width="720" height="90" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="1210" y="990" class="box-title" >边界与图例</text><text x="1210" y="1018" class="small" >所有页面只使用 HTTP API DTO；实线为主流程，虚线为回看、约束或后续影响。</text>
</svg>
