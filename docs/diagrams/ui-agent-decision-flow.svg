<svg width="2400" height="1180" viewBox="0 0 2400 1180" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#667085"/></marker><style>
text{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}
.title{font-size:34px;font-weight:700;fill:#1f2328}.subtitle{font-size:18px;fill:#667085}
.section{font-size:18px;font-weight:700;fill:#1f2328}.lane-title{font-size:16px;font-weight:700;fill:#1f2328}
.box-title{font-size:15px;font-weight:700;fill:#1f2328}.body{font-size:14px;fill:#344054}.small{font-size:12px;fill:#667085}.label{font-size:11px;fill:#667085}
.node{fill:#ffffff;stroke:#d6d9dd;stroke-width:2}.soft{fill:#eef1f4;stroke:#d6d9dd;stroke-width:2}.store{fill:#eef1f4;stroke:#d6d9dd;stroke-width:2}.warn{fill:#fff7ed;stroke:#fed7aa;stroke-width:2}.ok{fill:#f0fdf4;stroke:#bbf7d0;stroke-width:2}.blue{fill:#f8fbff;stroke:#bfdbfe;stroke-width:2}.term{fill:#ffffff;stroke:#d6d9dd;stroke-width:2;stroke-dasharray:6 4}.arrow{fill:none;stroke:#667085;stroke-width:2;marker-end:url(#arrow)}

</style></defs>
<rect width="2400" height="1180" fill="#f6f7f8"/>
<text x="60" y="72" class="title" >Agent 决策流程审计图</text><text x="60" y="108" class="subtitle" >单条建议必须经过状态、证据、Agent、规则裁决和记录保存；用户动作只做确认记录。</text><rect x="36" y="150" width="2328" height="120" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="66" y="188" class="section" >触发层</text><text x="66" y="212" class="small" >用户咨询或定时任务只触发建议生成，不触发交易。</text><rect x="36" y="310" width="2328" height="220" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="66" y="348" class="section" >状态与证据层</text><text x="66" y="372" class="small" >读取账户、持仓、行情、规则版本，并完成证据核查。</text><rect x="36" y="570" width="2328" height="210" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="66" y="608" class="section" >分析与裁决层</text><text x="66" y="632" class="small" >DeepSeek 只输出观点；最终建议由规则裁决生成。</text><rect x="36" y="820" width="2328" height="170" rx="12" fill="#ffffff" stroke="#d6d9dd" /><text x="66" y="858" class="section" >记录与展示层</text><text x="66" y="882" class="small" >DecisionRecordNode 保存成功后，前端才展示结构化裁决报告。</text><rect x="36" y="1030" width="2328" height="100" rx="12" fill="#eef1f4" stroke="#d6d9dd" /><text x="66" y="1068" class="section" >异常分支</text><text x="66" y="1092" class="small" >首次使用、信息不足、冻结观察、记录失败都不回连正式建议主路径。</text><rect x="120" y="190" width="200" height="72" rx="12" class="node" /><text x="138" y="220" class="box-title" >用户咨询</text><text x="138" y="246" class="small" >持仓复核 / 新问题</text><rect x="430" y="190" width="210" height="72" rx="12" class="node" /><text x="448" y="220" class="box-title" >定时任务</text><text x="448" y="246" class="small" >每日纪律报告</text><rect x="760" y="190" width="240" height="72" rx="12" class="node" /><text x="778" y="220" class="box-title" >WorkflowContext</text><text x="778" y="246" class="small" >request_id / symbol / type</text><rect x="120" y="400" width="220" height="72" rx="12" class="node" /><text x="138" y="430" class="box-title" >StateSnapshotNode</text><text x="138" y="456" class="small" >账户 / 持仓 / 行情 / 规则</text><rect x="610" y="400" width="240" height="72" rx="12" class="node" /><text x="628" y="430" class="box-title" >CapabilityCheckNode</text><text x="628" y="456" class="small" >能力圈 / 标的 / 问题</text><rect x="1120" y="400" width="250" height="72" rx="12" class="node" /><text x="1138" y="430" class="box-title" >EvidenceRetrievalNode</text><text x="1138" y="456" class="small" >SQLite + VecLite</text><rect x="1650" y="400" width="250" height="72" rx="12" class="node" /><text x="1668" y="430" class="box-title" >EvidencePackage</text><text x="1668" y="456" class="small" >formal / background</text><rect x="420" y="650" width="230" height="72" rx="12" class="node" /><text x="438" y="680" class="box-title" >价值分析师</text><text x="438" y="706" class="small" >DeepSeek</text><rect x="740" y="650" width="230" height="72" rx="12" class="node" /><text x="758" y="680" class="box-title" >趋势风控官</text><text x="758" y="706" class="small" >DeepSeek</text><rect x="1060" y="650" width="230" height="72" rx="12" class="node" /><text x="1078" y="680" class="box-title" >信息核查结果</text><text x="1078" y="706" class="small" >信源等级 / hash</text><rect x="1390" y="650" width="250" height="72" rx="12" class="node" /><text x="1408" y="680" class="box-title" >RuleArbitrationNode</text><text x="1408" y="706" class="small" >生成 final_verdict</text><rect x="280" y="880" width="230" height="72" rx="12" class="node" /><text x="298" y="910" class="box-title" >DecisionRecordNode</text><text x="298" y="936" class="small" >decision_records</text><rect x="610" y="880" width="210" height="72" rx="12" class="node" /><text x="628" y="910" class="box-title" >证据引用</text><text x="628" y="936" class="small" >evidence_refs</text><rect x="920" y="880" width="230" height="72" rx="12" class="node" /><text x="938" y="910" class="box-title" >审计事件</text><text x="938" y="936" class="small" >audit_events.action / node_action</text><rect x="1230" y="880" width="230" height="72" rx="12" class="node" /><text x="1248" y="910" class="box-title" >前端 DTO</text><text x="1248" y="936" class="small" >DecisionDetailViewModel</text><rect x="1560" y="880" width="260" height="72" rx="12" class="node" /><text x="1578" y="910" class="box-title" >用户确认区</text><text x="1578" y="936" class="small" >计划 / 手动执行 / 观察 / 错误</text><polygon points="470,392 528,436 470,480 412,436" class="soft"/><text x="470" y="429" class="box-title" text-anchor="middle" >数据完整</text><text x="470" y="449" class="small" text-anchor="middle" >否 → 信息不足</text><polygon points="980,392 1038,436 980,480 922,436" class="soft"/><text x="980" y="429" class="box-title" text-anchor="middle" >能力圈内</text><text x="980" y="449" class="small" text-anchor="middle" >否 → 拒绝交易分析</text><polygon points="1510,392 1568,436 1510,480 1452,436" class="soft"/><text x="1510" y="429" class="box-title" text-anchor="middle" >多源验证</text><text x="1510" y="449" class="small" text-anchor="middle" >失败 → 冻结观察</text><polygon points="1770,642 1828,686 1770,730 1712,686" class="soft"/><text x="1770" y="679" class="box-title" text-anchor="middle" >是否允许展示</text><text x="1770" y="699" class="small" text-anchor="middle" >保存失败 → 不展示</text><path d="M 320 226 L 760 226" class="arrow"/><rect x="476.0" y="201.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="540.0" y="218.0" class="label" text-anchor="middle" >请求</text><path d="M 1000 226 L 230 400" class="arrow"/><rect x="551.0" y="288.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="615.0" y="305.0" class="label" text-anchor="middle" >进入状态读取</text><path d="M 340 436 L 412 436" class="arrow"/><path d="M 528 436 L 610 436" class="arrow"/><rect x="505.0" y="411.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="569.0" y="428.0" class="label" text-anchor="middle" >是</text><path d="M 850 436 L 922 436" class="arrow"/><path d="M 1038 436 L 1120 436" class="arrow"/><rect x="1015.0" y="411.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1079.0" y="428.0" class="label" text-anchor="middle" >是</text><path d="M 1370 436 L 1452 436" class="arrow"/><path d="M 1568 436 L 1650 436" class="arrow"/><rect x="1545.0" y="411.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1609.0" y="428.0" class="label" text-anchor="middle" >满足</text><path d="M 1775 472 L 535 650" class="arrow" stroke-dasharray="6 5"/><rect x="1091.0" y="536.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1155.0" y="553.0" class="label" text-anchor="middle" >正式依据</text><path d="M 650 686 L 740 686" class="arrow"/><rect x="631.0" y="661.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="695.0" y="678.0" class="label" text-anchor="middle" >并行观点</text><path d="M 970 686 L 1060 686" class="arrow"/><rect x="951.0" y="661.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1015.0" y="678.0" class="label" text-anchor="middle" >核查</text><path d="M 1290 686 L 1390 686" class="arrow"/><rect x="1276.0" y="661.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1340.0" y="678.0" class="label" text-anchor="middle" >规则裁决</text><path d="M 1640 686 L 1712 686" class="arrow"/><path d="M 1770 730 L 395 880" class="arrow"/><rect x="1018.5" y="780.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1082.5" y="797.0" class="label" text-anchor="middle" >保存正式结果</text><path d="M 510 916 L 610 916" class="arrow"/><rect x="496.0" y="891.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="560.0" y="908.0" class="label" text-anchor="middle" >关联</text><path d="M 820 916 L 920 916" class="arrow"/><rect x="806.0" y="891.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="870.0" y="908.0" class="label" text-anchor="middle" >审计</text><path d="M 1150 916 L 1230 916" class="arrow"/><rect x="1126.0" y="891.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1190.0" y="908.0" class="label" text-anchor="middle" >组装</text><path d="M 1460 916 L 1560 916" class="arrow"/><rect x="1446.0" y="891.0" width="128" height="22" rx="11" fill="#eef1f4" stroke="#d6d9dd" /><text x="1510.0" y="908.0" class="label" text-anchor="middle" >确认入口</text><rect x="380" y="1060" width="190" height="64" rx="12" class="term" /><text x="398" y="1090" class="box-title" >首次使用</text><text x="398" y="1116" class="small" >录入账户</text><rect x="700" y="1060" width="190" height="64" rx="12" class="term" /><text x="718" y="1090" class="box-title" >信息不足</text><text x="718" y="1116" class="small" >展示缺失项</text><rect x="1020" y="1060" width="190" height="64" rx="12" class="term" /><text x="1038" y="1090" class="box-title" >冻结观察</text><text x="1038" y="1116" class="small" >多源或 background_only</text><rect x="1340" y="1060" width="220" height="64" rx="12" class="term" /><text x="1358" y="1090" class="box-title" >不展示正式建议</text><text x="1358" y="1116" class="small" >记录失败或高危</text><text x="154" y="1143" class="small" >图例：普通框=处理节点；菱形=判断；虚线=异常分支；formal 仅 S/A/B，C 级只能 background。</text>
</svg>
